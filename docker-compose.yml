services:
  creative-engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CREATIVE_DATABASE__POSTGRES_URL=postgresql+asyncpg://engine:engine_dev@postgres:5432/creative_engine
      - CREATIVE_DATABASE__NEO4J_URI=bolt://neo4j:7687
      - CREATIVE_DATABASE__NEO4J_USER=neo4j
      - CREATIVE_DATABASE__NEO4J_PASSWORD=neo4j_dev
      - CREATIVE_DATABASE__REDIS_URL=redis://redis:6379/0
      - CREATIVE_LLM__DEFAULT__API_KEY=${OPENAI_API_KEY}
    # Neo4j y Redis son opcionales (auditoría M3): el motor arranca y genera
    # ideas sin ellos — solo Postgres es una dependencia dura de arranque.
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: engine
      POSTGRES_PASSWORD: engine_dev
      POSTGRES_DB: creative_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine -d creative_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.27-community
    environment:
      NEO4J_AUTH: neo4j/neo4j_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_dev 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  neo4jdata:
  redisdata:
